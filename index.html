<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discourse Approaches Interactive Chart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="main-title">Approaches Between Religious and Secular Discourse</h1>

<div class="dashboard-container">
    <div class="tabs">
      <button class="tab-button" onclick="openTab('tab1', this)">Ideal types setting</button>
      <button class="tab-button" onclick="openTab('tab2', this)">Islamic context</button>
      <button class="tab-button" onclick="openTab('tab3', this)">Interfaith context</button>
      <button class="tab-button" onclick="openTab('tab4', this)">Secular context</button>
      <button class="tab-button" onclick="openTab('tab5', this)" id="comparison-tab-button">Comparison</button>
    </div>

    <div id="tab1" class="tab-content">
        <span class="comparison-title">Ideal types setting</span>
        <div id="interactive-chart-tab1"></div>
    </div>

    <div id="tab2" class="tab-content">
        <span class="comparison-title">Islamic context</span>
        <div id="interactive-chart-tab2"></div>
    </div>

    <div id="tab3" class="tab-content">
        <span class="comparison-title">Interfaith context</span>
        <div id="interactive-chart-tab3"></div>
    </div>

    <div id="tab4" class="tab-content">
        <span class="comparison-title">Secular context</span>
        <div id="interactive-chart-tab4"></div>
    </div>

    <div id="tab5" class="tab-content">
        <span class="comparison-title" style="text-align: center; display: block; margin-bottom: 30px;">Side-by-Side Comparison</span>
        <div id="comparison-stack"></div>
    </div>

    <div class="legend-container" id="global-legend"></div>
</div>

<script src="script.js"></script>
</body>
</html>
